<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="#050505"/>
  <rect x="6" y="6" width="20" height="20" rx="4" fill="#111"/>
  <g clip-path="url(#half)">
    <rect x="6" y="6" width="10" height="20" fill="url(#color)"/>
    <rect x="16" y="6" width="10" height="20" fill="url(#mono)"/>
  </g>
  <rect x="15.5" y="6" width="1" height="20" fill="#fff" opacity="0.85"/>
  <defs>
    <clipPath id="half">
      <rect x="6" y="6" width="20" height="20" rx="4"/>
    </clipPath>
    <linearGradient id="color" x1="6" y1="6" x2="16" y2="26" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f4b183"/>
      <stop offset="0.55" stop-color="#c96e4e"/>
      <stop offset="1" stop-color="#3a4a6b"/>
    </linearGradient>
    <linearGradient id="mono" x1="16" y1="6" x2="26" y2="26" gradientUnits="userSpaceOnUse">
      <stop stop-color="#cfcfcf"/>
      <stop offset="1" stop-color="#2a2a2a"/>
    </linearGradient>
  </defs>
</svg>
